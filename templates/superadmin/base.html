<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superadmin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">
</head>

<body>

<!-- TOP HEADER -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary px-4">
    
    <!-- Left Logo -->
    <div class="d-flex align-items-center gap-2">
        <button class="btn d-lg-none text-white p-1" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" style="border:none; background:transparent;">
            <i class="fa-solid fa-bars fs-4"></i>
        </button>
        <a class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2 m-0" href="/">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Diskly Logo" style="height: 32px;">
            <span>Disk<span class="text-highlight">ly</span></span>
        </a>
    </div>

    <!-- Right Menu -->
    <div class="d-flex align-items-center gap-3">
        <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle Theme">
            <i class="fa-solid fa-moon"></i>
        </button>
        <!-- Desktop Nav -->
        <div class="d-none d-lg-flex align-items-center gap-3">
            <a href="/superadmin/logout" class="btn btn-sm btn-danger px-3">
                <i class="fa-solid fa-right-from-bracket me-1"></i>Logout
            </a>
        </div>
</nav>


<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="offcanvas-lg offcanvas-start bg-dark text-white border-end border-secondary"
         tabindex="-1" id="sidebarMenu" style="width:250px; min-height:100vh;">

         <div class="offcanvas-header d-lg-none border-bottom border-secondary mb-3">
             <h5 class="offcanvas-title fw-bold" style="color: var(--text-color);">Menu</h5>
             <button type="button" class="btn-close" style="filter: invert(1);" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Close"></button>
         </div>

         <div class="offcanvas-body p-3 pt-0 pt-lg-3 flex-column">
            <ul class="nav flex-column w-100">

                <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/superadmin/dashboard" class="nav-link text-white px-0">
                    <i class="fa-solid fa-chart-pie me-2 text-success"></i>
                    Dashboard
                </a>
            </li>

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/superadmin/videos" class="nav-link text-white px-0">
                    <i class="fa-solid fa-video me-2 text-danger"></i>
                    Global Videos
                </a>
            </li>

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/superadmin/admins" class="nav-link text-white px-0">
                    <i class="fa-solid fa-users me-2 text-primary"></i>
                    Manage Admins
                </a>
            </li>

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/superadmin/settings" class="nav-link text-white px-0">
                    <i class="fa-solid fa-gear me-2 text-info"></i>
                    System Settings
                </a>
            </li>

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/superadmin/payouts" class="nav-link text-white px-0">
                    <i class="fa-solid fa-money-bill-wave me-2 text-warning"></i>
                    Payout Requests
                </a>
            </li>

            <li class="nav-item py-2">
                <a href="/superadmin/logout" class="nav-link text-white px-0">
                    <i class="fa-solid fa-right-from-bracket me-2 text-light"></i>
                    Logout
                </a>
            </li>

        </ul>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="p-4 w-100" style="overflow-x: hidden; max-width: 100vw;">
        {% block content %}{% endblock %}
    </div>

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
