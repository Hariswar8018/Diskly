{% extends 'admin/base.html' %}

{% block content %}


<style>
    body {
        background: #0b0b0b;
        color: white;
    }

    .card-dark {
        background: #111;
        border-radius: 12px;
        padding: 12px;
    }

    .video-row {
        cursor: pointer;
    }
</style>


<div class="container-fluid p-4">

    <h3 class="mb-4">🎬 Videos</h3>

    <!-- Search & Filter -->
    <div class="row mb-4 g-2">
        <div class="col-md-8">
            <input id="searchInput" class="form-control" placeholder="Search videos by title or description...">
        </div>
        <div class="col-md-4">
            <select id="sortSelect" class="form-select">
                <option value="newest">Newest First</option>
                <option value="views">Most Views</option>
                <option value="likes">Most Likes</option>
                <option value="downloads">Most Downloads</option>
            </select>
        </div>
    </div>

    <div class="row">

        <!-- LEFT -->
        <div class="col-lg-8">
            <div id="videoList" class="row g-3"></div>
        </div>

        <!-- RIGHT -->
        <div class="col-lg-4">
            <div class="card-dark">

                <div id="emptyState">
                    <p>Select a video</p>
                </div>

                <div id="videoDetails" style="display:none;">

                    <video id="detailVideo" controls class="w-100 mb-3"></video>
                    <img id="detailThumb" class="w-100 mb-3" style="display:none;">

                    <h5 id="detailTitle"></h5>
                    <p id="detailDesc" class="text-muted"></p>

                    <div class="d-flex gap-3 mb-3">
                        <span id="detailViews"></span>
                        <span id="detailLikes"></span>
                        <span id="detailDownloads"></span>
                    </div>

                    <div class="d-flex gap-2 mb-2">
                        <button class="btn btn-success w-100" id="copyBtn">Copy Link</button>
                        <button class="btn btn-warning w-100" id="editBtn" data-bs-toggle="modal" data-bs-target="#editModal">Edit</button>
                    </div>
                    <button class="btn btn-danger w-100" id="deleteBtn">Delete</button>

                </div>

            </div>
        </div>

    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Edit Video</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editForm">
            <input type="hidden" id="editVideoId">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" id="editTitle" class="form-control bg-secondary text-white border-0" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea id="editDescription" class="form-control bg-secondary text-white border-0" rows="4"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
    const videos = {{ videos | tojson | safe }};

    function renderVideos(videoList) {
        const container = document.getElementById("videoList");
        container.innerHTML = "";

        videos.forEach(video => {

            const html = `
        <div class="col-12 video-item"
            data-title="${(video.title || '').toLowerCase()}"
            data-description="${(video.description || '').toLowerCase()}"
            data-views="${video.views || 0}"
            data-likes="${video.likes || 0}"
            data-downloads="${video.bookmarks || 0}"
            data-id="${video.id}">

            <div class="custom-nav-container p-2 video-row"
                style="border-radius:14px; cursor:pointer;"
                onclick="loadVideo('${video.id}')">

                <div class="row align-items-center gx-3 gy-2">

                    <!-- Thumbnail -->
                    <div class="col-md-3">
                        <img src="${video.thumbnailUrl || 'https://placehold.co/500x300/041408/1f9c40?text=Diskly'}"
                             class="w-100 rounded-3"
                             style="height:95px; object-fit:cover;">
                    </div>

                    <!-- Info -->
                    <div class="col-md-7">

                        <h6 class="fw-bold mb-1">${video.title}</h6>

                        <p class="text-white-50 small mb-1"
                           style="font-size:13px; line-height:1.25; max-height:34px; overflow:hidden;">
                           ${(video.description || 'No description available.').slice(0, 90)}...
                        </p>

                        <div class="d-flex gap-3 small text-white-50 mb-2" style="font-size:12px;">
                            <span>👁 ${video.views || 0} Views</span>
                            <span>❤️ ${video.likes || 0} Likes</span>
                            <span>⬇ ${video.bookmarks || 0} Downloads</span>
                        </div>

                        <!-- Copy Box -->
                        <div class="custom-nav-container px-2 py-1 d-flex justify-content-between align-items-center"
                             style="border-radius:10px; cursor:pointer;"
                             onclick="event.stopPropagation(); copyDiskly('${video.downloadKey}', this)">

                            <div class="small text-white-50 text-truncate pe-2" style="font-size:12px;">
                                https://diskly.in/${video.downloadKey}
                            </div>

                            <span class="badge bg-success px-2 py-1" style="font-size:11px;">
                                Copy
                            </span>
                        </div>

                    </div>

                    <!-- Button -->
                    <div class="col-md-2 text-md-end">
                        <button class="btn btn-primary-green btn-sm px-3">
                            Open
                        </button>
                    </div>

                </div>
            </div>

        </div>
        `;

            container.innerHTML += html;
        });
    }


    function loadVideo(id) {
        try {
            const v = videos.find(vid => vid.id == id);
            if (!v) {
                alert("Video not found!");
                return;
            }

            document.getElementById("emptyState").style.display = "none";
            document.getElementById("videoDetails").style.display = "block";

            const video = document.getElementById("detailVideo");
            const thumb = document.getElementById("detailThumb");

            if (v.streamUrl) {
                video.style.display = "block";
                thumb.style.display = "none";
                video.src = v.streamUrl;
            } else {
                video.style.display = "none";
                thumb.style.display = "block";
                thumb.src = v.thumbnailUrl;
            }

            document.getElementById("detailTitle").innerText = v.title;
            document.getElementById("detailDesc").innerText = v.description || 'No description available';
            document.getElementById("detailViews").innerText = "👁 " + (v.views || 0);
            document.getElementById("detailLikes").innerText = "❤️ " + (v.likes || 0);
            document.getElementById("detailDownloads").innerText = "⬇ " + (v.bookmarks || 0);

            document.getElementById("copyBtn").onclick = () => {
                navigator.clipboard.writeText("https://diskly.in/" + v.downloadKey);
                alert("Copied!");
            };

            document.getElementById("editVideoId").value = v.id;
            document.getElementById("editTitle").value = v.title;
            document.getElementById("editDescription").value = v.description || '';

            document.getElementById("deleteBtn").onclick = () => deleteVideo(v.id);

        } catch (err) {
            alert("Failed to load video");
        }
    }

    async function deleteVideo(id) {
        if (!confirm("Delete video?")) return;

        try {
            const res = await fetch(`/admin/videos/${id}`, {
                method: "DELETE"
            });

            if (res.ok) {
                alert("Deleted");
                window.location.reload();
            } else {
                alert("Delete failed");
            }

        } catch {
            alert("Server error");
        }
    }

    document.getElementById("searchInput").addEventListener("keyup", function () {
        const value = this.value.toLowerCase();
        document.querySelectorAll(".video-item").forEach(el => {
            const t = el.getAttribute("data-title");
            const d = el.getAttribute("data-description");
            el.style.display = (t.includes(value) || d.includes(value)) ? "block" : "none";
        });
    });
    
    document.getElementById("sortSelect").addEventListener("change", function() {
        const val = this.value;
        const container = document.getElementById("videoList");
        const items = Array.from(container.getElementsByClassName("video-item"));
        
        items.sort((a, b) => {
            if (val === 'views') return parseInt(b.dataset.views) - parseInt(a.dataset.views);
            if (val === 'likes') return parseInt(b.dataset.likes) - parseInt(a.dataset.likes);
            if (val === 'downloads') return parseInt(b.dataset.downloads) - parseInt(a.dataset.downloads);
            // Default to newest (we use ID as proxy for date here since they are appended in order)
            return parseInt(b.dataset.id) - parseInt(a.dataset.id);
        });
        
        container.innerHTML = "";
        items.forEach(item => container.appendChild(item));
    });

    document.getElementById("editForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const id = document.getElementById("editVideoId").value;
        const title = document.getElementById("editTitle").value;
        const description = document.getElementById("editDescription").value;
        
        try {
            const res = await fetch(`/admin/videos/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title, description })
            });

            if (res.ok) {
                alert("Saved!");
                window.location.reload();
            } else {
                alert("Failed to save changes");
            }
        } catch(err) {
            alert("Server error");
        }
    });

    function copyDiskly(downloadKey, element) {
        navigator.clipboard.writeText("https://diskly.in/" + downloadKey);
        const badge = element.querySelector('.badge');
        if (badge) {
            badge.innerText = "Copied!";
            setTimeout(() => {
                badge.innerText = "Copy";
            }, 2000);
        }
    }

    renderVideos(videos);
</script>

{% endblock %}
