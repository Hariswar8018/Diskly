{% extends 'admin/base.html' %}

{% block content %}


<style>
    body {
        background: #0b0b0b;
        color: white;
    }

    .card-dark {
        background: #111;
        border-radius: 12px;
        padding: 12px;
    }

    .video-row {
        cursor: pointer;
    }
</style>


<div class="container-fluid p-4">

    <h3 class="mb-4">🎬 Videos</h3>

    <!-- Search -->
    <div class="mb-4">
        <input id="searchInput" class="form-control" placeholder="Search videos...">
    </div>

    <div class="row">

        <!-- LEFT -->
        <div class="col-lg-8">
            <div id="videoList" class="row g-3"></div>
        </div>

        <!-- RIGHT -->
        <div class="col-lg-4">
            <div class="card-dark">

                <div id="emptyState">
                    <p>Select a video</p>
                </div>

                <div id="videoDetails" style="display:none;">

                    <video id="detailVideo" controls class="w-100 mb-3"></video>
                    <img id="detailThumb" class="w-100 mb-3" style="display:none;">

                    <h5 id="detailTitle"></h5>
                    <p id="detailDesc" class="text-muted"></p>

                    <div class="d-flex gap-3 mb-3">
                        <span id="detailViews"></span>
                        <span id="detailLikes"></span>
                        <span id="detailDownloads"></span>
                    </div>

                    <button class="btn btn-success w-100 mb-2" id="copyBtn">Copy Link</button>
                    <button class="btn btn-danger w-100" id="deleteBtn">Delete</button>

                </div>

            </div>
        </div>

    </div>
</div>

<script>
    const videos = {{ videos | tojson | safe }};

    function renderVideos(videoList) {
        const container = document.getElementById("videoList");
        container.innerHTML = "";

        videos.forEach(video => {

            const html = `
        <div class="col-12 video-item"
            data-title="${(video.title || '').toLowerCase()}"
            data-description="${(video.description || '').toLowerCase()}">

            <div class="custom-nav-container p-2 video-row"
                style="border-radius:14px; cursor:pointer;"
                onclick="loadVideo('${video.id}')">

                <div class="row align-items-center gx-3 gy-2">

                    <!-- Thumbnail -->
                    <div class="col-md-3">
                        <img src="${video.thumbnailUrl || 'https://placehold.co/500x300/041408/1f9c40?text=Diskly'}"
                             class="w-100 rounded-3"
                             style="height:95px; object-fit:cover;">
                    </div>

                    <!-- Info -->
                    <div class="col-md-7">

                        <h6 class="fw-bold mb-1">${video.title}</h6>

                        <p class="text-white-50 small mb-1"
                           style="font-size:13px; line-height:1.25; max-height:34px; overflow:hidden;">
                           ${(video.description || 'No description available.').slice(0, 90)}...
                        </p>

                        <div class="d-flex gap-3 small text-white-50 mb-2" style="font-size:12px;">
                            <span>👁 ${video.views || 0} Views</span>
                            <span>❤️ ${video.likes || 0} Likes</span>
                            <span>⬇ ${video.bookmarks || 0} Downloads</span>
                        </div>

                        <!-- Copy Box -->
                        <div class="custom-nav-container px-2 py-1 d-flex justify-content-between align-items-center"
                             style="border-radius:10px; cursor:pointer;"
                             onclick="event.stopPropagation(); copyDiskly('${video.id}', this)">

                            <div class="small text-white-50 text-truncate pe-2" style="font-size:12px;">
                                https://Diskly.in/${video.id}
                            </div>

                            <span class="badge bg-success px-2 py-1" style="font-size:11px;">
                                Copy
                            </span>
                        </div>

                    </div>

                    <!-- Button -->
                    <div class="col-md-2 text-md-end">
                        <button class="btn btn-primary-green btn-sm px-3">
                            Open
                        </button>
                    </div>

                </div>
            </div>

        </div>
        `;

            container.innerHTML += html;
        });
    }


    function loadVideo(id) {
        try {
            const v = videos.find(vid => vid.id == id);
            if (!v) {
                alert("Video not found!");
                return;
            }

            document.getElementById("emptyState").style.display = "none";
            document.getElementById("videoDetails").style.display = "block";

            const video = document.getElementById("detailVideo");
            const thumb = document.getElementById("detailThumb");

            if (v.streamUrl) {
                video.style.display = "block";
                thumb.style.display = "none";
                video.src = v.streamUrl;
            } else {
                video.style.display = "none";
                thumb.style.display = "block";
                thumb.src = v.thumbnailUrl;
            }

            document.getElementById("detailTitle").innerText = v.title;
            document.getElementById("detailDesc").innerText = v.description || 'No description available';
            document.getElementById("detailViews").innerText = "👁 " + (v.views || 0);
            document.getElementById("detailLikes").innerText = "❤️ " + (v.likes || 0);
            document.getElementById("detailDownloads").innerText = "⬇ " + (v.bookmarks || 0);

            document.getElementById("copyBtn").onclick = () => {
                navigator.clipboard.writeText("https://Diskly.in/" + v.id);
                alert("Copied!");
            };

            document.getElementById("deleteBtn").onclick = () => deleteVideo(v.id);

        } catch (err) {
            alert("Failed to load video");
        }
    }

    async function deleteVideo(id) {
        if (!confirm("Delete video?")) return;

        try {
            const res = await fetch(`/admin/videos/${id}`, {
                method: "DELETE"
            });

            if (res.ok) {
                alert("Deleted");
                window.location.reload();
            } else {
                alert("Delete failed");
            }

        } catch {
            alert("Server error");
        }
    }

    document.getElementById("searchInput").addEventListener("keyup", function () {
        const value = this.value.toLowerCase();
        document.querySelectorAll(".video-item").forEach(el => {
            el.style.display = el.innerText.toLowerCase().includes(value) ? "block" : "none";
        });
    });

    renderVideos(videos);
</script>

{% endblock %}
