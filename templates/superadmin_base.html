<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">
</head>

<body>

<!-- TOP HEADER -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary px-4">
    
    <!-- Left Logo -->
    <a class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2" href="/">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Diskly Logo" style="height: 32px;">
        <span>Disk<span class="text-highlight">ly</span></span>
    </a>

    <!-- Right Menu -->
    <div class="d-flex align-items-center gap-3">
        <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle Theme">
            <i class="fa-solid fa-moon"></i>
        </button>
        <!-- Desktop Nav -->
        <div class="d-none d-lg-flex align-items-center gap-3">

        

        <a href="/superadmin/dashboard" class="text-white text-decoration-none small">
            <i class="fa-solid fa-chart-pie me-1"></i>Dashboard
        </a>

        <div class="vr text-white"></div>

        <a href="/superadmin/admins" class="text-white text-decoration-none small">
            <i class="fa-solid fa-users me-1"></i>Admins
        </a>

        <div class="vr text-white"></div>
        <a href="/superadmin/settings" class="text-white text-decoration-none small">
            <i class="fa-solid fa-gear me-1"></i>Settings
        </a>

        <div class="vr text-white"></div>

        <a href="/superadmin/payouts" class="text-white text-decoration-none small">
            <i class="fa-solid fa-money-bill me-1"></i>Payouts
        </a>

        <div class="vr text-white"></div>

        <a href="/superadmin/logout" class="btn btn-sm btn-danger px-3">
            <i class="fa-solid fa-right-from-bracket me-1"></i>Logout
        </a>

    </div>
</nav>


<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="bg-dark text-white p-3 border-end border-secondary"
         style="width:250px; min-height:100vh;">


        <ul class="nav flex-column">

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/superadmin/dashboard" class="nav-link text-white px-0">
                    <i class="fa-solid fa-chart-pie me-2 text-success"></i>
                    Dashboard
                </a>
            </li>

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/superadmin/admins" class="nav-link text-white px-0">
                    <i class="fa-solid fa-users me-2 text-primary"></i>
                    Manage Admins
                </a>
            </li>

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/superadmin/settings" class="nav-link text-white px-0">
                    <i class="fa-solid fa-gear me-2 text-info"></i>
                    System Settings
                </a>
            </li>

            <li class="nav-item py-2 border-bottom border-secondary">
                <a href="/superadmin/payouts" class="nav-link text-white px-0">
                    <i class="fa-solid fa-money-bill-wave me-2 text-warning"></i>
                    Payout Requests
                </a>
            </li>

            <li class="nav-item py-2">
                <a href="/superadmin/logout" class="nav-link text-white px-0">
                    <i class="fa-solid fa-right-from-bracket me-2 text-light"></i>
                    Logout
                </a>
            </li>

        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="p-4 w-100">
        {% block content %}{% endblock %}
    </div>

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeBtn = document.getElementById('theme-toggle');
            const currentTheme = localStorage.getItem('theme') || 'dark'; // Default to dark

            document.documentElement.setAttribute('data-theme', currentTheme);
            updateIcon(currentTheme);

            if(themeBtn) {
                themeBtn.addEventListener('click', () => {
                    let theme = document.documentElement.getAttribute('data-theme');
                    let newTheme = theme === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                    updateIcon(newTheme);
                });
            }

            function updateIcon(theme) {
                if(themeBtn) {
                    themeBtn.innerHTML = theme === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
                }
            }
        });
    </script>
</body>
</html>
